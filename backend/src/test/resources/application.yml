spring:
  datasource:
    url: jdbc:h2:mem:camera_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;NON_KEYWORDS=CURRENT_ROLE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
  mail:
    host: localhost
    port: 3025
    username: test@example.com
    password: test

jwt:
  secret: test-secret-key-for-unit-testing-purposes-only
  expire-hours: 24

file:
  storage:
    local-path: ./target/test-uploads

camera:
  demo:
    seed-users: false
  order:
    adapter: mock
    c-base-url: http://localhost:8080
